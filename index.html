<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bible Review Hub</title>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyB_s-sIVQDCpmnSuqvVIVWRmy_cta8myoM",
  authDomain: "church-bible-review.firebaseapp.com",
  projectId: "church-bible-review",
  storageBucket: "church-bible-review.firebasestorage.app",
  messagingSenderId: "53543883622",
  appId: "1:53543883622:web:95cb620a9bd60c0abb2ea7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Elements
const bookContainer = document.getElementById("bookContainer");
const chapterContainer = document.getElementById("chapterContainer");
const submitBtn = document.getElementById("submitBtn");
const nameInput = document.getElementById("nameInput");
const reflectionInput = document.getElementById("reflectionInput");
const adminPanel = document.getElementById("adminPanel");
const closeAdminBtn = document.getElementById("closeAdmin");
const submissionsDiv = document.getElementById("submissions");
const menuBtn = document.getElementById("menuBtn");
const assignmentCard = document.getElementById("assignmentCard");

// State
let selectedBook = "Matthew";
let selectedChapter = 1;
const books = {
  Genesis:50, Exodus:40, Leviticus:27, Numbers:36, Deuteronomy:34,
  Joshua:24, Judges:21, Ruth:4, Matthew:28, Mark:16, Luke:24, John:21
};

// Functions
function renderBooks(){
  bookContainer.innerHTML="";
  Object.keys(books).forEach(b=>{
    const card = document.createElement("div");
    card.className = b===selectedBook?"bookCard selected":"bookCard";
    card.textContent = b;
    card.addEventListener("click",()=>{
      selectedBook=b;
      selectedChapter=1;
      renderBooks();
      renderChapters();
      updateAssignment();
    });
    bookContainer.appendChild(card);
  });
}

function renderChapters(){
  chapterContainer.innerHTML="";
  for(let i=1;i<=books[selectedBook];i++){
    const ch=document.createElement("div");
    ch.className=i===selectedChapter?"chapterCard selected":"chapterCard";
    ch.textContent=i;
    ch.addEventListener("click",()=>{
      selectedChapter=i;
      renderChapters();
      updateAssignment();
    });
    chapterContainer.appendChild(ch);
  }
}

function updateAssignment(){
  assignmentCard.innerHTML=`<h3>Current Assignment</h3>
  <p><b>${selectedBook} ${selectedChapter}</b></p>
  <p>Chapter ${selectedChapter} of ${books[selectedBook]}</p>`;
}

// Initial render
renderBooks();
renderChapters();
updateAssignment();

// Submit reflection
submitBtn.addEventListener("click",async()=>{
  const name=nameInput.value.trim();
  const reflection=reflectionInput.value.trim();
  if(!name||!reflection){alert("Fill all fields");return;}
  await addDoc(collection(db,"reviews"),{
    name:name, book:selectedBook, chapter:selectedChapter, review:reflection, date:new Date()
  });
  alert("Reflection submitted!");
  nameInput.value="";
  reflectionInput.value="";
});

// Admin toggle
menuBtn.addEventListener("click",async()=>{
  if(adminPanel.style.display==="block"){
    adminPanel.style.display="none";
  }else{
    adminPanel.style.display="block";
    submissionsDiv.innerHTML="Loading...";
    const querySnapshot=await getDocs(collection(db,"reviews"));
    submissionsDiv.innerHTML="";
    querySnapshot.forEach(doc=>{
      const r=doc.data();
      submissionsDiv.innerHTML+=`<p><b>${r.name}</b> (${r.book} ${r.chapter}): ${r.review}</p>`;
    });
  }
});

// Close admin
closeAdminBtn.addEventListener("click",()=>{adminPanel.style.display="none";});
</script>

<style>
body{margin:0;font-family:'Poppins',sans-serif;background:#f6f3ff;}
header{background:#7b1fa2;color:#fff;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
header .title{font-size:1.3em;font-weight:600;}
#menuBtn{font-size:1.5em;cursor:pointer;}
#bookContainer{display:flex;gap:10px;overflow-x:auto;padding:10px;}
.bookCard{padding:10px 18px;border-radius:12px;background:#d1c4e9;color:#333;cursor:pointer;transition:0.3s;flex:0 0 auto;text-align:center;}
.bookCard.selected{background:#6a1b9a;color:#fff;}
.bookCard:hover{transform:scale(1.05);}
#chapterContainer{display:grid;grid-template-columns:repeat(auto-fit,minmax(40px,1fr));gap:10px;padding:10px;}
.chapterCard{padding:12px;text-align:center;background:#e0e0e0;border-radius:10px;cursor:pointer;transition:0.2s;}
.chapterCard.selected{background:#ff9800;color:#fff;font-weight:bold;}
.chapterCard:hover{transform:scale(1.05);}
#assignmentCard{background:#ede7f6;padding:16px;border-radius:16px;margin:12px;box-shadow:2px2px8px rgba(0,0,0,0.2);}
#reflectionInput,#nameInput{width:100%;padding:10px;margin-top:8px;border-radius:10px;border:1px solid #ccc;resize:none;}
#submitBtn{width:100%;padding:14px;border:none;border-radius:12px;background:#7b1fa2;color:#fff;font-weight:bold;cursor:pointer;margin-top:12px;}
#submitBtn:hover{background:#8e24aa;transform:scale(1.02);}
#adminPanel{display:none;position:fixed;top:60px;right:20px;width:360px;background:#fff;color:#333;padding:16px;border-radius:16px;box-shadow:2px2px12px rgba(0,0,0,0.3);max-height:70vh;overflow-y:auto;}
#closeAdmin{margin-top:12px;width:100%;padding:10px;border:none;border-radius:12px;background:#7b1fa2;color:#fff;cursor:pointer;}
#closeAdmin:hover{background:#8e24aa;}
#submissions p{background:#d7bde2;padding:10px;border-radius:10px;margin-bottom:6px;}
</style>
</head>
<body>

<header>
  <div class="title">Bible Review Hub</div>
  <div id="menuBtn">☰</div>
</header>

<div id="assignmentCard"></div>

<h4 style="margin-left:10px;">Select Book</h4>
<div id="bookContainer"></div>

<h4 style="margin-left:10px;">Chapters</h4>
<div id="chapterContainer"></div>

<div style="background:#ede7f6;padding:16px;border-radius:16px;margin:12px;box-shadow:2px2px8px rgba(0,0,0,0.2);">
  <label>Your Name:</label>
  <input id="nameInput" placeholder="Type your name"/>
  <label style="margin-top:8px;display:block;">Reflection:</label>
  <textarea id="reflectionInput" rows="5" placeholder="Write your reflection here"></textarea>
  <button id="submitBtn">✈ Submit Reflection</button>
</div>

<div id="adminPanel">
  <h3>Submissions</h3>
  <div id="submissions"></div>
  <button id="closeAdmin">Close</button>
</div>

</body>
</html>
